name: Update related index

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: related-index-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check upstream checksums
        id: sources
        run: npm run check:sources >> "$GITHUB_OUTPUT"
      - name: Rebuild and validate
        if: steps.sources.outputs.changed == 'true'
        run: |
          npm run build
          npm run validate
      - name: Record successful refresh
        if: steps.sources.outputs.changed == 'true'
        run: |
          mkdir -p updates
          printf '%s\tchecksums changed; rebuilt and validated\tlexicon=%s\tsemantic_classes=%s\n' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "${{ steps.sources.outputs.lexicon }}" \
            "${{ steps.sources.outputs.semantic_classes }}" >> updates/refresh.log
      - name: Create update PR
        if: steps.sources.outputs.changed == 'true'
        id: pull-request
        uses: peter-evans/create-pull-request@v7
        with:
          base: master
          branch: automation/related-index-refresh
          delete-branch: true
          commit-message: "chore: refresh related-word index"
          title: "chore: refresh related-word index"
          body: |
            Automated rebuild after an upstream source checksum change.

            The generated index passed `npm run validate`.
      - name: Enable auto-merge
        if: steps.pull-request.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.pull-request.outputs.pull-request-number }}" --auto --squash --delete-branch
